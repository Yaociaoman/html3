<!DOCTYPE html>
<html>
<head>
<title>Border example</title>
</head>

<body>

<h1>Border example</h1>

    <p>Hello World!</p>
    
    p.one{
        border:3px double red;
        border-background:lightblue;
    }
    p.two{
        border:2px solid blue;
        border-radius:5px;
        border-background:yellow;
    }
    p.three{
        border:4px dotted gray;
        border-background:green;
    }
    
</body>
</html>
