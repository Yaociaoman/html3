<!DOCTYPE html>
<html>
<head>
<title>Border example</title>

<style>
p.one {
    border: 5px double red;
    background-color: lightblue;
    padding: 10px;
    font-size: 30px;
}

p.two {
    border: 2px solid blue;
    border-radius: 10px;
    background-color: yellow;
    padding: 10px;
    font-size: 30px;
}

p.three {
    background-color: green;
    padding: 10px;
    font-size: 30px;
    font-weight: bold;
    
    border: none;
    background-image: radial-gradient(gray 20%, transparent 20%);
    background-size: 20px 20px;
}
</style>

</head>

<body>

<h1>Border example</h1>

<p class="one">Hello World</p>
<p class="two">Hello World</p>
<p class="three">Hello World</p>

</body>
</html>
